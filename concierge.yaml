juju:
  model-defaults:
    test-mode: "true"
    automatically-retry-hooks: "false"

providers:
  lxd:
    enable: true
    bootstrap: true
  k8s:
    enable: true
    bootstrap: true
    bootstrap-constraints:
      root-disk: "2G"
    features:
      load-balancer:
        l2-mode: "true"
        cidrs: "10.43.45.0/28"
      local-storage: {}
      network: {}

host:
  packages:
    - git
    - gnome-keyring
    - gnupg
    - python3-pip
    - python3-venv
    - wget
  snaps:
    astral-uv:
      classic: true
    charmcraft:
    jq:
    yq:
    rockcraft:
    terraform:
    tflint:
